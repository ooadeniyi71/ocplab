# Source: clusterinstance/templates/clusterinstance.yaml
apiVersion: siteconfig.open-cluster-management.io/v1alpha1
kind: ClusterInstance
metadata:
  name: adc-cluster
  namespace: open-cluster-management
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  holdInstallation: false
  clusterName: adc-cluster
  baseDomain: example.com
  pullSecretRef:
    name: pullsecret-cluster-adc-cluster
  clusterImageSetNameRef: openshift-4.14
  sshPublicKey: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQC..."
  networkType: OVNKubernetes
  apiVIP: "192.168.1.10"
  ingressVIP: "192.168.1.11"
  additionalNTPSources:
    - ntp.example.com
    - 8.8.8.8
  clusterLabels:
    cloud: BareMetal
    tier: cdf
    site: adc
    environment: production
    cluster.open-cluster-management.io/clusterset: production
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
  machineNetwork:
    - cidr: 192.168.1.0/24
  templateRefs:
    - name: ai-cluster-templates-v1
      namespace: open-cluster-management
  nodes:
    - hostName: master-1.adc.example.com
      role: master
      bootMACAddress: 00:50:56:c0:00:01
      bootMode: UEFI
      rootDeviceHints:
        deviceName: /dev/sda
      templateRefs:
        - name: ai-node-templates-v1
          namespace: open-cluster-management
      nodeNetwork:
        interfaces:
          - name: ens1f0
            macAddress: 00:50:56:c0:01:01
        config:
          interfaces:
            - name: ens1f0
              type: ethernet
              state: up
              mac-address: 00:50:56:c0:01:01
              ipv4:
                enabled: true
                address:
                  - ip: 192.168.1.20
                    prefix-length: 22
                dhcp: false
          dns-resolver:
            config:
              server:
                - 8.8.8.8
                - 8.8.4.4
          routes:
            config:
              - destination: 0.0.0.0/0
                next-hop-address: 192.168.1.1
                next-hop-interface: ens1f0
                table-id: 254
    - hostName: master-2.adc.example.com
      role: master
      bootMACAddress: 00:50:56:c0:00:02
