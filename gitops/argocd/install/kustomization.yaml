apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  - argocd-server-route.yaml

helmCharts:
  - name: my-chart
    repo: https://github.com/ooadeniyi71/ocplab.git
    version: 1.0.0
    releaseName: my-release
    path: gitops/argocd/install
    valuesFile: 
    - clusterinstance.yaml
    - values.yaml
    - values.schema.json

  
